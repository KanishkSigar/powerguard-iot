# ============================================================
# PowerGuard IoT — Docker Compose (Infrastructure)
# ============================================================
# Starts Mosquitto MQTT broker and InfluxDB.
# Run: docker-compose up -d
# ============================================================

services:
  # ----------------------
  # MQTT Broker
  # ----------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: powerguard-mosquitto
    ports:
      - "1883:1883"    # MQTT
      - "9001:9001"    # WebSocket (optional)
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

  # ----------------------
  # Time-Series Database
  # ----------------------
  influxdb:
    image: influxdb:2.7
    container_name: powerguard-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=powerguard123
      - DOCKER_INFLUXDB_INIT_ORG=powerguard
      - DOCKER_INFLUXDB_INIT_BUCKET=energy_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    restart: unless-stopped

volumes:
  mosquitto-data:
  mosquitto-log:
  influxdb-data:
  influxdb-config:

# Note: To clear database completely, remove the influxdb-data volume
