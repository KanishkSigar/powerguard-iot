# ============================================================
# PowerGuard IoT — Mosquitto MQTT Broker Configuration
# ============================================================

# ----------------------
# Network Settings
# ----------------------
listener 1883
protocol mqtt

# ----------------------
# Authentication
# ----------------------
# For development: allow anonymous connections
# For production: set to false and configure password file
allow_anonymous true

# Uncomment for password-based auth:
# allow_anonymous false
# password_file /mosquitto/config/passwd

# ----------------------
# Persistence
# ----------------------
persistence true
persistence_location /mosquitto/data/

# ----------------------
# Logging
# ----------------------
log_dest stdout
log_type all
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
